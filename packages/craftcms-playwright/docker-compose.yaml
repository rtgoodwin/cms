#      interval: 5s
#      retries: 3
  mysql:
    env_file: ../../tests-playwright/.env
    image: mysql:8.0
    ports:
      - ${PLAYWRIGHT_CRAFT_DB_PORT:-33069}:3306
    environment:
      MYSQL_ROOT_PASSWORD: ${PLAYWRIGHT_CRAFT_DB_PASSWORD:-craft}
      MYSQL_DATABASE: ${PLAYWRIGHT_CRAFT_DB_DATABASE:-craft_test}
      MYSQL_USER: ${PLAYWRIGHT_CRAFT_DB_USER:-craft}
      MYSQL_PASSWORD: ${PLAYWRIGHT_CRAFT_DB_PASSWORD:-craft}
    healthcheck:
      test: [ 'CMD', 'mysqladmin', 'ping' ]
      interval: 10s
      retries: 5
    command:
      [
        'mysqld',
        '--character-set-server=utf8mb4',
        '--collation-server=utf8mb4_unicode_ci',
      ]
  playwright:
    env_file: ../../tests-playwright/.env
    build:
      context: ../../
      target: craft
      dockerfile: ./node_modules/@craftcms/playwright/Dockerfile
    ports:
      - ${PLAYWRIGHT_SITE_PORT:-8089}:8080
    environment:
      CRAFT_APP_ID: ${PLAYWRIGHT_CRAFT_APP_ID:-CraftCMS}
      CRAFT_ENVIRONMENT: ${PLAYWRIGHT_CRAFT_ENVIRONMENT:-dev}
      CRAFT_SECURITY_KEY: ${PLAYWRIGHT_CRAFT_SECURITY_KEY:-1234567890}
      CRAFT_CP_TRIGGER: ${PLAYWRIGHT_CRAFT_CP_TRIGGER:-admin}

      # pgsql start
#      CRAFT_DB_DRIVER: ${PLAYWRIGHT_CRAFT_DB_DRIVER:-pgsql}
#      CRAFT_DB_SERVER: ${PLAYWRIGHT_CRAFT_DB_SERVER:-postgres}
#      CRAFT_DB_PORT: ${PLAYWRIGHT_CRAFT_DB_PORT:-5432}
      # pgsql end

      # mysql start
      CRAFT_DB_DRIVER: ${PLAYWRIGHT_CRAFT_DB_DRIVER:-mysql}
      CRAFT_DB_SERVER: ${PLAYWRIGHT_CRAFT_DB_SERVER:-mysql}
      CRAFT_DB_PORT: ${PLAYWRIGHT_CRAFT_DB_PORT:-3306}
      # mysql end

      CRAFT_DB_DATABASE: ${PLAYWRIGHT_CRAFT_DB_DATABASE:-craft_test}
      CRAFT_DB_USER: ${PLAYWRIGHT_CRAFT_DB_USER:-craft}
      CRAFT_DB_PASSWORD: ${PLAYWRIGHT_CRAFT_DB_PASSWORD:-craft}
      CRAFT_DB_SCHEMA: ${PLAYWRIGHT_CRAFT_DB_SCHEMA:-public}
      CRAFT_DB_TABLE_PREFIX: ${PLAYWRIGHT_CRAFT_DB_TABLE_PREFIX:-}
      PRIMARY_SITE_URL: ${PLAYWRIGHT_SITE_DOMAIN:-http://127.0.0.1/}
    depends_on:
#      postgres:
#        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - ${PLAYWRIGHT_REPO_PATH:-../../.}:/app/repos/repo/
      - ./webserver/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./webserver/supervisord.d/nginx.ini:/etc/supervisord.d/nginx.ini
